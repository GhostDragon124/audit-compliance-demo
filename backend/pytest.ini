[pytest]
markers =
    local_ocr: real local OCR provider acceptance tests, excluded by default
    local_qwen: real local Qwen/OpenAI-compatible endpoint tests, excluded by default
    local_embedding: real local embedding endpoint tests, excluded by default
    case001_local_ocr: Case 001 real OCR provider tests (requires PaddleOCR)
    case001_e2e: Case 001 full end-to-end tests (requires real Qwen + Embedding)
addopts = -m "not local_ocr and not local_qwen and not local_embedding and not case001_e2e"
